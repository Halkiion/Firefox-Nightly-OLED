name: build apk
on:
  workflow_dispatch:
  schedule:
    - cron: '00 0 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release info
        id: getLatest
        uses: cardinalby/git-get-release-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          latest: true
          doNotFailIfNotFound: true

      - name: Install dependencies
        run: |
            sudo apt update
            sudo apt install -y jq

      - name: Get latest Firefox Nightly build tag
        run: |
          set -euo pipefail
          YEAR="$(date -u +%Y)"
          MONTH="$(date -u +%m)"
          ROOT="https://releases.mozilla.org/pub/fenix/nightly/${YEAR}/${MONTH}/"

          BUILD_DIR="$(
            curl -fsSL "$ROOT" \
            | grep -oE "/pub/fenix/nightly/${YEAR}/${MONTH}/[^\"']+/" \
            | sed -E "s#^/pub/fenix/nightly/${YEAR}/${MONTH}/##" \
            | grep -E "^${YEAR}-${MONTH}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-fenix-.*-android/$" \
            | sort | tail -n 1
          )"

          if [[ -z "${BUILD_DIR:-}" ]]; then
            echo "ERROR: Could not determine latest build dir from ${ROOT}" >&2
            exit 1
          fi

          echo "BUILD_VERSION=${BUILD_DIR%/}" >> $GITHUB_ENV

      - name: Check if latest version was already built
        if: ${{ steps.getLatest.outputs.tag_name == env.BUILD_VERSION }}
        run: |
          echo latest version already built and released
          exit -1

      - name: Install build dependencies
        run: |
            sudo apt update
            sudo apt install -y wget apktool zipalign apksigner

      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Run build script and sign apk
        run: |
          cd ${{ github.workspace }}
          chmod +x ./build.sh
          ./build.sh
          echo "${{ secrets.KEYSTORE }}" | base64 -di > keystore.jks
          apksigner sign --ks keystore.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSPHRASE }} patched_signed.apk

      - name: Set release notes
        run: |
          echo "RELEASE_NOTES=Automated build for Firefox Nightly: $BUILD_VERSION" >> $GITHUB_ENV

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.BUILD_VERSION }}
          files: ${{ github.workspace }}/patched_signed.apk
          body: ${{ env.RELEASE_NOTES }}
